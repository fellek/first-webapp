[PHP]
; Fehler-Anzeige in Production deaktivieren
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Limits
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
upload_max_filesize = 20M
post_max_size = 20M

; Zeitzone
date.timezone = Europe/Berlin

[opcache]
opcache.enable = 1
